An_redaction_box=.redacted-section .canvas-scroll-container canvas.image-canvas
An_redaction_save_btn= Save
An_Approver_Enter_FullScreen_btn= [title="Enter Fullscreen"]
An_Approver_Exit_FullScreen_btn= [title="Exit Fullscreen"]
An_redaction_Submit= Submit
An_Redactor_HomeTab=a.nav-tab i.fa-home
#Approver Role - Approving request

An_Review_Pending= button:has-text(' Review Pending ')

An_Approve_&_Export_btn= .btn.btn-success

An_Sign_out=a.nav-tab:has(i.fa-sign-out-alt)