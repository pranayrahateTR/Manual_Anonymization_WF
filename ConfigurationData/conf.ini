[basic info]
testsiteurl=https://devtr-anonymizationwebtool.sureprep.com/

[pytest]
addopts= --browser-chrome --headed --slowmo=2000

[locators]

#Login
An_username=#username
An_password=#password
An_SignOnBtn=#signOnButton


#Approver Role

An_requesttab= Request
An_DocumentSearch= Document Search
An_engagementId=#engagementId
An_templateName=#templateName
An_pageType=#pageType
An_pageNumber=#pageNumber
An_pageRange=#pageRange
An_startDate=#startDate
An_endDate=#endDate
An_searchBtn= Search Document(s)
An_priorityDrpdown=#priorityHeader
An_selectAllcheckbox=Select All
An_createJobbtn=button[title*="Save"]
