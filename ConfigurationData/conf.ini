An_requestId=.header-request-id
An_HomeTab= Home

#Redactor Role

An_userRole_Redactor=div.logo-section > span.logo-text + span
An_redactorText=(Redactor)
An_group_id_field=div.filter-input-wrapper input[placeholder="Request ID..."]
An_Assign_btn= Assign
An_Assign_Yes_btn=button.btn.btn-success > span.btn-icon
An_Redaction_Pending_btn= button:has-text(' Redaction Pending ')
An_Enter_FullScreen_btn= [title="Enter Fullscreen"]
